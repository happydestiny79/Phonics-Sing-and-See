<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFLI Sing &amp; See</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Poppins:wght@600&amp;display=swap');
        
        :root {
            --primary: #2563eb;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8fafc;
            color: #1e2937;
            line-height: 1.6;
        }
        
        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 2rem 0;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        
        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.25rem;
            margin: 0 0 0.5rem;
            color: #0f172a;
        }
        
        .subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin: 0;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        
        .video-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            background: #0f172a;
        }
        
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-info {
            padding: 1.25rem;
        }
        
        .video-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin: 0 0 0.25rem;
            color: #0f172a;
        }
        
        .video-meta {
            font-size: 0.875rem;
            color: #64748b;
        }
        
        .footer {
            margin-top: 4rem;
            padding: 2rem 0;
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>UFLI Sing &amp; See</h1>
            <p class="subtitle">Phonics songs and cartoons for early readers</p>
        </div>
    </div>

    <div class="container">
        <div class="video-grid">
            
            <!-- Video 1 -->
            <div class="video-card">
                <div class="video-wrapper">
                    <video controls>
                        <source src="short_a_phonics_extended.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <div class="video-info">
                    <div class="video-title">Short A Song</div>
                    <div class="video-meta">Lesson 1 • ~30 seconds • Extended version with music</div>
                </div>
            </div>

            <!-- Placeholder for future videos -->
            <div class="video-card" style="opacity: 0.6;">
                <div class="video-wrapper" style="display: flex; align-items: center; justify-content: center; background: #e2e8f0; color: #64748b;">
                    <div style="text-align: center;">
                        <div style="font-size: 2rem; margin-bottom: 0.5rem;">+</div>
                        <div>Next lesson coming soon</div>
                    </div>
                </div>
                <div class="video-info">
                    <div class="video-title">Coming Soon</div>
                    <div class="video-meta">More UFLI phonics songs</div>
                </div>
            </div>

        </div>
    </div>

    <div class="footer">
        <p>Private project • For internal sharing and feedback</p>
    </div>
</body>
</html>
